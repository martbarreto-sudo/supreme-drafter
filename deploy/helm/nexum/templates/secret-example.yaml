{{- /*
Secret de EXEMPLO (opt-in). So e renderizado quando secrets.create=true.
Em producao, prefira criar o Secret fora do chart (fora do controle de versao)
e apontar secrets.existingSecret para ele. Este template existe apenas para
conveniencia de dev/demonstracao — nao versione segredos reais aqui.
*/ -}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexum.fullname" . }}-secrets
  labels:
    {{- include "nexum.labels" . | nindent 4 }}
type: Opaque
data:
  outbox-dsn: {{ .Values.externalServices.postgres.dsn | b64enc | quote }}
  redis-url: {{ .Values.externalServices.redis.url | b64enc | quote }}
{{- end }}
