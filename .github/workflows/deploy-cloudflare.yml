name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Publica o site (Static Assets) no Cloudflare Workers em war.ribeiroetigre.org.
# Requer o secret CLOUDFLARE_API_TOKEN (Settings -> Secrets and variables -> Actions).
# Enquanto o secret não existir, os passos são PULADOS (job verde, sem deploy),
# em vez de falhar — assim o CI não fica vermelho à toa.
jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    if: github.repository == 'martbarreto-sudo/supreme-drafter'
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Aviso se o token não estiver configurado
        if: env.CF_TOKEN == ''
        run: |
          echo "::notice title=Deploy pulado::CLOUDFLARE_API_TOKEN não configurado. Adicione o secret para ativar o deploy em war.ribeiroetigre.org."

      - name: Checkout
        if: env.CF_TOKEN != ''
        uses: actions/checkout@v4

      - name: Deploy
        if: env.CF_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
