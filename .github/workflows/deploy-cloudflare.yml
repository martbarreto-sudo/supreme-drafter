name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Publica o site (Static Assets) no Cloudflare Workers em war.ribeiroetigre.org.
# Requer o secret CLOUDFLARE_API_TOKEN (Repository secret, não Environment).
# Enquanto o secret não existir, o deploy é PULADO (job verde, sem deploy),
# e um diagnóstico não-vazante reporta o estado do token.
jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    if: github.repository == 'martbarreto-sudo/supreme-drafter'
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_TOKEN_VAR: ${{ vars.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Diagnóstico do token (não vaza o valor)
        run: |
          LEN_SECRET=${#CF_TOKEN}
          LEN_VAR=${#CF_TOKEN_VAR}
          echo "secrets.CLOUDFLARE_API_TOKEN -> len=$LEN_SECRET"
          echo "vars.CLOUDFLARE_API_TOKEN    -> len=$LEN_VAR"
          {
            echo "### Diagnóstico do deploy Cloudflare"
            echo "| Origem | Comprimento |"
            echo "| --- | --- |"
            echo "| \`secrets.CLOUDFLARE_API_TOKEN\` | $LEN_SECRET |"
            echo "| \`vars.CLOUDFLARE_API_TOKEN\` | $LEN_VAR |"
            echo ""
            if [ "$LEN_SECRET" -gt 0 ]; then
              echo "- ✅ Token presente em **Secrets**. Prosseguindo com o deploy."
            elif [ "$LEN_VAR" -gt 0 ]; then
              echo "- ⚠️ Token foi cadastrado em **Variables**, não em **Secrets**. Mova-o para a aba *Secrets* (Repository secret)."
            else
              echo "- ❌ Token **ausente** em ambas as abas deste repositório. Cadastre como **Repository secret** em Settings → Secrets and variables → Actions."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: env.CF_TOKEN != ''
        uses: actions/checkout@v4

      - name: Deploy
        if: env.CF_TOKEN != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Resumo do deploy
        if: env.CF_TOKEN != '' && steps.deploy.outcome == 'success'
        run: |
          {
            echo "- 🚀 Deploy concluído."
            echo "- URL: https://war.ribeiroetigre.org"
          } >> "$GITHUB_STEP_SUMMARY"
