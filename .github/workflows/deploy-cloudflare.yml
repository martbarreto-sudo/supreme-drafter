name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Publica o site (Static Assets) no Cloudflare Workers em war.ribeiroetigre.org.
# Requer o secret CLOUDFLARE_API_TOKEN (Repository secret, não Environment).
# Enquanto o secret não existir, o deploy é PULADO (job verde, sem deploy),
# e um diagnóstico não-vazante reporta o estado do token.
jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    if: github.repository == 'martbarreto-sudo/supreme-drafter'
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Diagnóstico do token (não vaza o valor)
        run: |
          LEN=${#CF_TOKEN}
          echo "Comprimento do CLOUDFLARE_API_TOKEN: $LEN"
          {
            echo "### Diagnóstico do deploy Cloudflare"
            if [ "$LEN" -eq 0 ]; then
              echo "- ❌ \`CLOUDFLARE_API_TOKEN\` **ausente** (len=0). Cadastre como **Repository secret** em Settings → Secrets and variables → Actions."
              echo "- Deploy **pulado**."
            else
              echo "- ✅ \`CLOUDFLARE_API_TOKEN\` presente (len=$LEN). Prosseguindo com o deploy."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: env.CF_TOKEN != ''
        uses: actions/checkout@v4

      - name: Deploy
        if: env.CF_TOKEN != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Resumo do deploy
        if: env.CF_TOKEN != '' && steps.deploy.outcome == 'success'
        run: |
          {
            echo "- 🚀 Deploy concluído."
            echo "- URL: https://war.ribeiroetigre.org"
          } >> "$GITHUB_STEP_SUMMARY"
