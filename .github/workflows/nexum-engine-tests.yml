name: NEXUM Engine — testes de contrato

on:
  push:
    paths:
      - "nexum_engine/**"
      - ".github/workflows/nexum-engine-tests.yml"
  pull_request:
    paths:
      - "nexum_engine/**"
      - ".github/workflows/nexum-engine-tests.yml"

jobs:
  testes:
    name: Contratos, adaptadores e trava de regressão
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # A trava TestModelStringRegression varre `git ls-files`.
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar pytest
        run: python -m pip install --upgrade pip pytest

      # Nenhuma credencial de nuvem: a suíte usa fakes e injeção de
      # dependência pura — o pipeline valida a arquitetura no verde.
      - name: Rodar suíte da engine
        run: pytest -q nexum_engine/
